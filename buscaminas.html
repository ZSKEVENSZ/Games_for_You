<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscaminas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    header { width: 100%; max-width: 420px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .back-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 10px 14px; border-radius: 12px; text-decoration: none; font-weight: 700; }
    h1 { font-size: 26px; text-align: center; margin-bottom: 8px; }
    .info { font-size: 14px; color: #cbd5e1; margin-bottom: 14px; text-align: center; max-width: 420px; }
    .stats { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
    .stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 10px 14px; min-width: 110px; text-align: center; }
    .stat strong { display: block; font-size: 18px; margin-bottom: 4px; color: #f8fafc; }
    #board { display: grid; gap: 6px; grid-template-columns: repeat(6, minmax(40px, 60px)); justify-content: center; }
    .cell { width: 60px; height: 60px; display: grid; place-items: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; cursor: pointer; color: #fff; font-size: 24px; font-weight: 900; user-select: none; transition: transform 0.1s, background 0.2s; }
    .cell:active { transform: scale(0.97); }
    .cell.open { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.24); cursor: default; }
    .cell.flag { background: rgba(248,113,113,0.16); }
    .cell.mine { background: rgba(248,113,113,0.25); color: #fffbeb; }
    .cell.dead { animation: shake 0.25s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
    .btn { background: linear-gradient(135deg,#2563eb,#8b5cf6); border: none; color: #fff; border-radius: 14px; padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s, filter 0.2s; }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: scale(0.98); }
    .message { margin-top: 14px; color: #cbd5e1; text-align: center; min-height: 22px; }
  </style>
</head>
<body>
  <header>
    <a href="menu.html" class="back-btn">← Menú</a>
    <div></div>
  </header>
  <h1>💣 Buscaminas</h1>
  <p class="info">Encuentra todas las casillas seguras sin detonar las minas. Usa clic normal para abrir y clic derecho para marcar.</p>

  <div class="stats">
    <div class="stat"><strong id="mineCount">5</strong> Minas</div>
    <div class="stat"><strong id="safeCount">0</strong> Seguras</div>
    <div class="stat"><strong id="bestVal">0</strong> Récord</div>
  </div>

  <div id="board"></div>
  <div class="message" id="message">Toca una casilla para empezar.</div>
  <div class="actions">
    <button class="btn" id="resetBtn">Reiniciar</button>
    <button class="btn" id="hintBtn">Pista</button>
  </div>

  <script>
    const ROWS = 6; const COLS = 6; const MINES = 5;
    let board = []; let opened = 0; let flags = 0; let gameOver = false; let bestScore = parseInt(localStorage.getItem('score_buscaminas') || '0');
    const boardEl = document.getElementById('board');
    const mineCountEl = document.getElementById('mineCount');
    const safeCountEl = document.getElementById('safeCount');
    const messageEl = document.getElementById('message');
    const bestValEl = document.getElementById('bestVal');
    bestValEl.textContent = bestScore;

    function init() {
      board = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => ({ mine:false, open:false, flag:false, count:0 })));
      opened = 0; flags = 0; gameOver = false;
      mineCountEl.textContent = MINES;
      safeCountEl.textContent = opened;
      messageEl.textContent = 'Toca una casilla para empezar.';
      createBoard();
      render();
    }

    function createBoard() {
      let placed = 0;
      while (placed < MINES) {
        const r = Math.floor(Math.random() * ROWS);
        const c = Math.floor(Math.random() * COLS);
        if (!board[r][c].mine) { board[r][c].mine = true; placed++; }
      }
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          board[r][c].count = countAdjacent(r,c);
        }
      }
    }

    function countAdjacent(r,c) {
      let cnt = 0;
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
        if (dr===0 && dc===0) continue;
        const nr = r+dr, nc = c+dc;
        if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].mine) cnt++;
      }
      return cnt;
    }

    function render() {
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${COLS}, minmax(40px, 60px))`;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = board[r][c];
          const el = document.createElement('div');
          el.className = 'cell' + (cell.open ? ' open' : '') + (cell.flag ? ' flag' : '') + (gameOver && cell.mine && !cell.open ? ' mine' : '');
          if (cell.open) {
            if (cell.mine) el.textContent = '💣';
            else if (cell.count) el.textContent = cell.count;
          } else if (cell.flag) {
            el.textContent = '🚩';
          }
          el.oncontextmenu = e => { e.preventDefault(); toggleFlag(r,c); };
          el.onclick = () => openCell(r,c);
          boardEl.appendChild(el);
        }
      }
      safeCountEl.textContent = opened;
    }

    function toggleFlag(r,c) {
      if (gameOver || board[r][c].open) return;
      board[r][c].flag = !board[r][c].flag;
      flags += board[r][c].flag ? 1 : -1;
      render();
    }

    function openCell(r,c) {
      if (gameOver) return;
      const cell = board[r][c];
      if (cell.open || cell.flag) return;
      if (cell.mine) return lose(r,c);
      reveal(r,c);
      if (opened === ROWS * COLS - MINES) win();
      render();
      messageEl.textContent = 'Sigue encontrando casillas seguras.';
    }

    function reveal(r,c) {
      const cell = board[r][c];
      if (cell.open || cell.flag) return;
      cell.open = true; opened++;
      if (cell.count === 0) {
        for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
          const nr = r+dr, nc = c+dc;
          if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS) reveal(nr,nc);
        }
      }
    }

    function lose(r,c) {
      gameOver = true;
      board[r][c].open = true;
      messageEl.textContent = '¡Perdiste! Tocaste una mina.';
      render();
    }

    function win() {
      gameOver = true;
      const score = opened * 20 + Math.max(0, (MINES - flags) * 10);
      messageEl.textContent = `¡Ganaste! Puntuación: ${score}`;
      if (score > bestScore) { bestScore = score; localStorage.setItem('score_buscaminas', score); bestValEl.textContent = bestScore; }
      try { if (window.parent && window.parent !== window && window.parent.guardarPuntuacion) window.parent.guardarPuntuacion('buscaminas', score); } catch(e){}
    }

    document.getElementById('resetBtn').onclick = init;
    document.getElementById('hintBtn').onclick = () => {
      if (gameOver) return;
      const safe = [];
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        if (!board[r][c].open && !board[r][c].mine && !board[r][c].flag) safe.push({r,c});
      }
      if (!safe.length) return;
      const hint = safe[Math.floor(Math.random() * safe.length)];
      board[hint.r][hint.c].open = true;
      reveal(hint.r, hint.c);
      if (opened === ROWS * COLS - MINES) win();
      render();
      messageEl.textContent = 'Pista aplicada: casilla segura abierta.';
    };

    init();
  </script>
</body>
</html>
