<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carreras de Autos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }
    #ui {
      position: absolute;
      top: 12px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 16px;
      z-index: 10;
      pointer-events: none;
    }
    .ui-box {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 16px;
      text-align: center;
    }
    .ui-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .ui-value { font-size: 22px; font-weight: 900; color: #f0f0f0; }
    #scoreVal { color: #ffd700; }
    #livesVal { color: #ff6b6b; }
    #levelVal { color: #a78bfa; }
    canvas {
      display: block;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
    }
    #overlay h2 { font-size: 36px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px #ffd70088; }
    #overlay p { font-size: 16px; color: #ccc; text-align: center; max-width: 260px; }
    .ov-score { font-size: 28px; color: #a78bfa; font-weight: bold; }
    .btn-game {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      color: #fff;
      padding: 14px 40px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
      pointer-events: all;
    }
    .btn-game:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(168, 85, 247, 0.7); }
    .btn-game:active { transform: scale(0.97); }
    #mobileControls {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 15;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      color: #fff;
      width: 70px; height: 70px;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

  <div id="ui">
    <div class="ui-box">
      <div class="ui-label">Puntos</div>
      <div class="ui-value" id="scoreVal">0</div>
    </div>
    <div class="ui-box">
      <div class="ui-label">Nivel</div>
      <div class="ui-value" id="levelVal">1</div>
    </div>
    <div class="ui-box">
      <div class="ui-label">Vidas</div>
      <div class="ui-value" id="livesVal">❤️❤️❤️</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="mobileControls">
    <button class="ctrl-btn" id="btnLeft">◀</button>
    <button class="ctrl-btn" id="btnRight">▶</button>
  </div>

  <div id="overlay">
    <div style="font-size:60px">🏎️</div>
    <h2>CARRERAS</h2>
    <p>Esquiva los autos enemigos.<br>Usa ← → o toca los botones.</p>
    <button class="btn-game" onclick="startGame()">¡Iniciar!</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Tamaño canvas responsive
    function resizeCanvas() {
      const maxW = Math.min(window.innerWidth, 420);
      const maxH = window.innerHeight;
      canvas.width = maxW;
      canvas.height = maxH;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Constantes de carretera
    const LANE_COUNT = 4;
    function getLaneX(lane) {
      const laneW = canvas.width / LANE_COUNT;
      return laneW * lane + laneW / 2;
    }

    // Estado del juego
    let state = 'menu';
    let score = 0;
    let lives = 3;
    let level = 1;
    let speed = 4;
    let frameCount = 0;
    let spawnRate = 90;
    let player, enemies, roadLines;
    let keys = {};
    let moveTimer = 0;
    let flashTimer = 0;
    let bestScore = parseInt(localStorage.getItem('score_carrera') || '0');

    // Colores de autos
    const CAR_COLORS = ['#ff4444','#ff8800','#ffdd00','#44aaff','#aa44ff','#44ff88','#ff44aa','#00ddff'];

    function createPlayer() {
      return {
        lane: 2,
        x: getLaneX(2),
        y: canvas.height - 120,
        w: 36, h: 64,
        color: '#00e5ff',
        targetX: getLaneX(2)
      };
    }

    function createEnemy() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      return {
        lane,
        x: getLaneX(lane),
        y: -80,
        w: 34, h: 62,
        color: CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)],
        speed: speed + Math.random() * 2
      };
    }

    function initRoadLines() {
      roadLines = [];
      for (let i = 0; i < 8; i++) {
        roadLines.push({ y: i * (canvas.height / 7) });
      }
    }

    function startGame() {
      state = 'playing';
      score = 0;
      lives = 3;
      level = 1;
      speed = 4;
      spawnRate = 90;
      frameCount = 0;
      player = createPlayer();
      enemies = [];
      initRoadLines();
      document.getElementById('overlay').style.display = 'none';
      updateUI();
      loop();
    }

    function drawRoad() {
      // Fondo asfalto
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Líneas laterales
      ctx.fillStyle = '#ffffff44';
      ctx.fillRect(2, 0, 4, canvas.height);
      ctx.fillRect(canvas.width - 6, 0, 4, canvas.height);

      // Marcas de carril
      const laneW = canvas.width / LANE_COUNT;
      ctx.setLineDash([40, 30]);
      ctx.strokeStyle = '#ffffff33';
      ctx.lineWidth = 2;
      for (let i = 1; i < LANE_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(laneW * i, 0);
        ctx.lineTo(laneW * i, canvas.height);
        ctx.stroke();
      }
      ctx.setLineDash([]);
    }

    function drawCar(car, isPlayer) {
      const x = car.x - car.w / 2;
      const y = car.y - car.h / 2;

      // Cuerpo principal
      ctx.fillStyle = isPlayer ? (flashTimer > 0 ? '#ffffff' : car.color) : car.color;
      ctx.beginPath();
      ctx.roundRect(x + 4, y, car.w - 8, car.h, 8);
      ctx.fill();

      // Ventana delantera/trasera
      ctx.fillStyle = isPlayer ? '#0088cc99' : '#00000088';
      ctx.beginPath();
      ctx.roundRect(x + 6, y + (isPlayer ? 8 : 12), car.w - 12, 18, 4);
      ctx.fill();

      // Ruedas
      ctx.fillStyle = '#111';
      [[x - 2, y + 8], [x + car.w - 4, y + 8],
       [x - 2, y + car.h - 20], [x + car.w - 4, y + car.h - 20]].forEach(([wx, wy]) => {
        ctx.beginPath();
        ctx.roundRect(wx, wy, 8, 14, 3);
        ctx.fill();
      });

      // Faros del jugador
      if (isPlayer) {
        ctx.fillStyle = '#ffffffcc';
        ctx.beginPath();
        ctx.ellipse(x + 8, y + car.h - 10, 5, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + car.w - 8, y + car.h - 10, 5, 3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function checkCollision(a, b) {
      return Math.abs(a.x - b.x) < (a.w / 2 + b.w / 2 - 6) &&
             Math.abs(a.y - b.y) < (a.h / 2 + b.h / 2 - 8);
    }

    function updateUI() {
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('levelVal').textContent = level;
      const hearts = ['❤️', '❤️❤️', '❤️❤️❤️'];
      document.getElementById('livesVal').textContent = lives > 0
        ? ['💔', '❤️', '❤️❤️', '❤️❤️❤️'][Math.max(0, lives)]
        : '💀';
    }

    function gameOver() {
      state = 'gameover';
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('score_carrera', score);
      }
      // Siempre notificar puntuación al padre (jugar.html la filtra por mejor)
      try {
        if (window.parent && window.parent !== window && window.parent.guardarPuntuacion) {
          window.parent.guardarPuntuacion('carrera', score);
        }
      } catch(e) {}
      showOverlay('gameover');
    }

    function showOverlay(type) {
      const ov = document.getElementById('overlay');
      ov.style.display = 'flex';
      if (type === 'gameover') {
        ov.innerHTML = `
          <div style="font-size:50px">💥</div>
          <h2 style="color:#ff6b6b">GAME OVER</h2>
          <p class="ov-score">Puntuación: ${score}</p>
          <p style="color:#aaa">Mejor: ${bestScore}</p>
          <button class="btn-game" onclick="startGame()">Reintentar</button>
          <button class="btn-game" style="background:linear-gradient(135deg,#374151,#4b5563);margin-top:4px" onclick="goMenu()">Menú</button>
        `;
      }
    }

    function goMenu() {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.location.href = 'menu.html';
        } else {
          window.location.href = 'menu.html';
        }
      } catch(e) {
        window.location.href = 'menu.html';
      }
    }

    let animId;
    function loop() {
      if (state !== 'playing') return;
      animId = requestAnimationFrame(loop);
      frameCount++;

      // Mover jugador suavemente
      player.x += (player.targetX - player.x) * 0.18;

      // Spawn enemigos
      if (frameCount % spawnRate === 0) {
        enemies.push(createEnemy());
      }

      // Mover road lines
      roadLines.forEach(l => {
        l.y += speed * 1.5;
        if (l.y > canvas.height) l.y -= canvas.height;
      });

      // Mover enemigos
      enemies.forEach(e => { e.y += e.speed; });
      enemies = enemies.filter(e => e.y < canvas.height + 100);

      // Puntaje por distancia
      score++;

      // Subir nivel
      if (score > 0 && score % 500 === 0) {
        level++;
        speed = Math.min(4 + level * 1.2, 18);
        spawnRate = Math.max(30, 90 - level * 8);
      }

      // Colisiones
      if (flashTimer <= 0) {
        for (let e of enemies) {
          if (checkCollision(player, e)) {
            lives--;
            flashTimer = 60;
            updateUI();
            if (lives <= 0) { cancelAnimationFrame(animId); gameOver(); return; }
            break;
          }
        }
      } else {
        flashTimer--;
      }

      updateUI();

      // Dibujar
      drawRoad();
      enemies.forEach(e => drawCar(e, false));
      drawCar(player, true);
    }

    // Controles teclado
    document.addEventListener('keydown', e => {
      if (state !== 'playing') return;
      if (e.key === 'ArrowLeft' || e.key === 'a') {
        if (player.lane > 0) {
          player.lane--;
          player.targetX = getLaneX(player.lane);
        }
      }
      if (e.key === 'ArrowRight' || e.key === 'd') {
        if (player.lane < LANE_COUNT - 1) {
          player.lane++;
          player.targetX = getLaneX(player.lane);
        }
      }
    });

    // Controles móvil
    document.getElementById('btnLeft').addEventListener('touchstart', e => {
      e.preventDefault();
      if (state !== 'playing') return;
      if (player.lane > 0) { player.lane--; player.targetX = getLaneX(player.lane); }
    }, { passive: false });
    document.getElementById('btnRight').addEventListener('touchstart', e => {
      e.preventDefault();
      if (state !== 'playing') return;
      if (player.lane < LANE_COUNT - 1) { player.lane++; player.targetX = getLaneX(player.lane); }
    }, { passive: false });

    document.getElementById('btnLeft').addEventListener('click', () => {
      if (state !== 'playing') return;
      if (player.lane > 0) { player.lane--; player.targetX = getLaneX(player.lane); }
    });
    document.getElementById('btnRight').addEventListener('click', () => {
      if (state !== 'playing') return;
      if (player.lane < LANE_COUNT - 1) { player.lane++; player.targetX = getLaneX(player.lane); }
    });

    // Swipe touch
    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (state !== 'playing') return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 30) {
        if (dx < 0 && player.lane > 0) { player.lane--; player.targetX = getLaneX(player.lane); }
        if (dx > 0 && player.lane < LANE_COUNT - 1) { player.lane++; player.targetX = getLaneX(player.lane); }
      }
    }, { passive: true });
  </script>
</body>
</html>
