<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JUEGOS ForYou – Acceso</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">

  <!-- Capa de partículas decorativas -->
  <div class="particles" id="particles"></div>

  <div class="auth-container">

    <!-- Logo / Título -->
    <div class="auth-logo">
      <img src="logo/logo.png" alt="JUEGOS ForYou" class="site-logo" />
      <h1 class="logo-title">JUEGOS <span>ForYou</span></h1>
      <p class="logo-sub">Tu colección personal de juegos</p>
    </div>

    <!-- Tabs de navegación -->
    <div class="auth-tabs">
      <button class="tab-btn active" id="tabLoginBtn" onclick="switchTab('login')">
        Iniciar Sesión
      </button>
      <button class="tab-btn" id="tabRegistroBtn" onclick="switchTab('registro')">
        Registrarse
      </button>
    </div>

    <!-- Formulario de Login -->
    <div class="auth-form" id="formLogin">
      <h2 class="form-title">¡Bienvenido de nuevo!</h2>
      <p class="form-subtitle">Ingresa tus credenciales para continuar</p>

      <div class="input-group">
        <label for="loginUsuario">
          <span class="input-icon">👤</span> Usuario
        </label>
        <input
          type="text"
          id="loginUsuario"
          placeholder="Escribe tu usuario"
          autocomplete="username"
          maxlength="30"
        />
        <span class="input-error" id="loginUsuarioError"></span>
      </div>

      <div class="input-group">
        <label for="loginPass">
          <span class="input-icon">🔒</span> Contraseña
        </label>
        <div class="input-password-wrap">
          <input
            type="password"
            id="loginPass"
            placeholder="Escribe tu contraseña"
            autocomplete="current-password"
            maxlength="30"
          />
          <button class="toggle-pass" type="button" onclick="togglePassword('loginPass', this)" title="Mostrar/ocultar">
            👁️
          </button>
        </div>
        <span class="input-error" id="loginPassError"></span>
      </div>

      <div class="form-alert hidden" id="loginAlert"></div>

      <button class="btn-primary btn-full" id="btnLogin" onclick="iniciarSesion()">
        <span class="btn-text">Iniciar Sesión</span>
        <span class="btn-icon">→</span>
      </button>

      <p class="form-footer">
        ¿No tienes cuenta?
        <a href="#" onclick="switchTab('registro')">Regístrate gratis</a>
      </p>
    </div>

    <!-- Formulario de Registro -->
    <div class="auth-form hidden" id="formRegistro">
      <h2 class="form-title">¡Crea tu cuenta!</h2>
      <p class="form-subtitle">Empieza a jugar en segundos</p>

      <div class="input-group">
        <label for="regUsuario">
          <span class="input-icon">👤</span> Usuario
        </label>
        <input
          type="text"
          id="regUsuario"
          placeholder="Elige un nombre de usuario"
          autocomplete="off"
          maxlength="30"
        />
        <span class="input-hint">3–30 caracteres, sin espacios</span>
        <span class="input-error" id="regUsuarioError"></span>
      </div>

      <div class="input-group">
        <label for="regPass">
          <span class="input-icon">🔒</span> Contraseña
        </label>
        <div class="input-password-wrap">
          <input
            type="password"
            id="regPass"
            placeholder="Mínimo 4 caracteres"
            autocomplete="new-password"
            maxlength="30"
          />
          <button class="toggle-pass" type="button" onclick="togglePassword('regPass', this)" title="Mostrar/ocultar">
            👁️
          </button>
        </div>
        <div class="password-strength" id="passwordStrength">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
        <span class="input-error" id="regPassError"></span>
      </div>

      <div class="input-group">
        <label for="regPassConfirm">
          <span class="input-icon">🔑</span> Confirmar Contraseña
        </label>
        <div class="input-password-wrap">
          <input
            type="password"
            id="regPassConfirm"
            placeholder="Repite tu contraseña"
            autocomplete="new-password"
            maxlength="30"
          />
          <button class="toggle-pass" type="button" onclick="togglePassword('regPassConfirm', this)" title="Mostrar/ocultar">
            👁️
          </button>
        </div>
        <span class="input-error" id="regPassConfirmError"></span>
      </div>

      <div class="form-alert hidden" id="registroAlert"></div>

      <button class="btn-primary btn-full" id="btnRegistro" onclick="registrarUsuario()">
        <span class="btn-text">Crear Cuenta</span>
        <span class="btn-icon">✨</span>
      </button>

      <p class="form-footer">
        ¿Ya tienes cuenta?
        <a href="#" onclick="switchTab('login')">Inicia sesión</a>
      </p>
    </div>

  </div>

  <!-- Toast de notificación -->
  <div class="toast" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
