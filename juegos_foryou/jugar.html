<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JUEGOS ForYou – Jugando</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .game-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 10;
      flex-shrink: 0;
    }
    .game-topbar-back {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .game-topbar-back:hover { background: rgba(255,255,255,0.2); }
    .game-topbar-title {
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      flex: 1;
    }
    .game-topbar-fs {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    .game-frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #gameFrame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .game-loading {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 5;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 18px; color: #ccc; }
  </style>
</head>
<body>

  <div class="game-topbar">
    <button class="game-topbar-back" onclick="regresarMenu()">← Menú</button>
    <span class="game-topbar-title" id="gameTitle">🎮 Cargando...</span>
    <button class="game-topbar-fs" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
  </div>

  <div class="game-frame-wrap">
    <div class="game-loading" id="gameLoading">
      <div class="loading-spinner"></div>
      <span class="loading-text">Cargando juego...</span>
    </div>
    <iframe id="gameFrame" src="" allowfullscreen></iframe>
  </div>

  <script>
    const JUEGOS_INFO = {
      carrera:       { titulo: '🏎️ Carreras de Autos',     src: 'carrera.html' },
      spaceinvaders: { titulo: '👾 Space Invaders',         src: 'spaceinvaders.html' },
      snake:         { titulo: '🐍 La Serpiente Clásica',   src: 'snake.html' },
      pingpong:      { titulo: '🏓 Ping Pong',              src: 'pingpong.html' },
      memorama:      { titulo: '🃏 Memorama',               src: 'memorama.html' },
      buscaminas:    { titulo: '💣 Buscaminas',             src: 'buscaminas.html' },
      rompecabezas:  { titulo: '🧩 Rompecabezas',           src: 'rompecabezas.html' },
      sopa:          { titulo: '🔤 Sopa de Letras',         src: 'sopa.html' },
      tresenraya:    { titulo: '❌ Tres en Raya',            src: 'tresenraya.html' }
    };

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function regresarMenu() {
      window.location.href = 'menu.html';
    }

    function toggleFullscreen() {
      const wrap = document.querySelector('.game-frame-wrap');
      if (!document.fullscreenElement) {
        wrap.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    // Guard de sesión
    (function() {
      try {
        const s = JSON.parse(sessionStorage.getItem('foryou_sesion') || 'null');
        if (!s) window.location.href = 'index.html';
      } catch(e) { window.location.href = 'index.html'; }
    })();

    // Bridge: los iframes llaman window.parent.guardarPuntuacion(juego, puntos)
    window.guardarPuntuacion = function(juego, puntos) {
      try {
        const s = JSON.parse(sessionStorage.getItem('foryou_sesion') || 'null');
        if (!s || !s.nombre) return;
        const key = s.nombre.toLowerCase();
        const all = JSON.parse(localStorage.getItem('foryou_scores') || '{}');
        if (!all[key]) all[key] = {};
        const prev = all[key][juego] || {};
        all[key][juego] = {
          mejor:    Math.max(prev.mejor || 0, puntos),
          ultima:   puntos,
          fecha:    Date.now(),
          partidas: (prev.partidas || 0) + 1,
        };
        localStorage.setItem('foryou_scores', JSON.stringify(all));
        // Actualizar monedas/xp del usuario
        const users = JSON.parse(localStorage.getItem('foryou_usuarios') || '{}');
        if (users[key]) {
          users[key].partidas = (users[key].partidas || 0) + 1;
          users[key].monedas  = (users[key].monedas  || 0) + Math.floor(puntos / 10);
          users[key].xp       = (users[key].xp       || 0) + Math.floor(puntos / 5);
          users[key].nivel    = Math.floor(users[key].xp / 500) + 1;
          localStorage.setItem('foryou_usuarios', JSON.stringify(users));
        }
      } catch(e) {}
    };

    document.addEventListener('DOMContentLoaded', function () {
      const juego = getParam('juego');
      const info = JUEGOS_INFO[juego];

      if (!info) {
        document.getElementById('gameTitle').textContent = 'Juego no encontrado';
        document.getElementById('gameLoading').innerHTML =
          '<p style="color:#f88;font-size:18px">Juego no encontrado.<br><br><a href="menu.html" style="color:#a78bfa">← Regresar al menú</a></p>';
        return;
      }

      document.title = info.titulo + ' – JUEGOS ForYou';
      document.getElementById('gameTitle').textContent = info.titulo;

      const frame = document.getElementById('gameFrame');
      frame.addEventListener('load', function () {
        document.getElementById('gameLoading').style.display = 'none';
      });
      frame.src = info.src;
    });
  </script>
</body>
</html>
