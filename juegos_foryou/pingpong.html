<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0010;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }
    canvas { display: block; border-radius: 8px; }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 20;
    }
    #overlay h2 { font-size: 36px; font-weight: 900; color: #a855f7; text-shadow: 0 0 20px #a855f799; }
    #overlay p { font-size: 15px; color: #bbb; text-align: center; max-width: 260px; line-height: 1.5; }
    .score-msg { font-size: 26px; font-weight: bold; color: #ffd700; }
    .btn-game {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none; color: #fff;
      padding: 13px 38px; border-radius: 30px;
      font-size: 17px; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 20px rgba(168,85,247,0.5);
      transition: transform 0.1s;
    }
    .btn-game:hover { transform: scale(1.05); }
    .btn-secondary {
      background: linear-gradient(135deg, #374151, #4b5563);
      box-shadow: none;
    }
    #mobileCtrl {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 16px;
      z-index: 15;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      color: #fff; width: 70px; height: 70px;
      border-radius: 50%; font-size: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="mobileCtrl">
    <button class="ctrl-btn" id="btnUp" ontouchstart="padUp=true" ontouchend="padUp=false">▲</button>
    <button class="ctrl-btn" id="btnDown" ontouchstart="padDown=true" ontouchend="padDown=false">▼</button>
  </div>

  <div id="overlay">
    <div style="font-size:58px">🏓</div>
    <h2>PING PONG</h2>
    <p>Mueve tu paleta con ↑ ↓ o los botones.<br>¡Marca 5 puntos para ganar!</p>
    <button class="btn-game" onclick="startGame()">¡Iniciar!</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let W, H, PAD_H, PAD_W, BALL_R;

    function resizeCanvas() {
      W = Math.min(window.innerWidth, 500);
      H = Math.min(window.innerHeight - 100, 600);
      canvas.width = W;
      canvas.height = H;
      PAD_H = H * 0.18;
      PAD_W = 14;
      BALL_R = W * 0.025;
    }
    resizeCanvas();

    let state = 'menu';
    let playerPad, aiPad, ball;
    let playerScore = 0, aiScore = 0;
    let animId;
    let keys = {};
    let padUp = false, padDown = false;
    let WIN_SCORE = 5;
    let bestScore = parseInt(localStorage.getItem('score_pingpong') || '0');

    function initObjects() {
      playerPad = { x: 16, y: H / 2 - PAD_H / 2, w: PAD_W, h: PAD_H, speed: H * 0.012 };
      aiPad = { x: W - 16 - PAD_W, y: H / 2 - PAD_H / 2, w: PAD_W, h: PAD_H };
      resetBall();
    }

    function resetBall() {
      const angle = (Math.random() * 60 - 30) * (Math.PI / 180);
      const dir = Math.random() > 0.5 ? 1 : -1;
      const speed = W * 0.008;
      ball = {
        x: W / 2, y: H / 2,
        vx: Math.cos(angle) * speed * dir,
        vy: Math.sin(angle) * speed,
        r: BALL_R,
        trail: []
      };
    }

    function startGame() {
      state = 'playing';
      playerScore = 0;
      aiScore = 0;
      initObjects();
      document.getElementById('overlay').style.display = 'none';
      cancelAnimationFrame(animId);
      loop();
    }

    function loop() {
      if (state !== 'playing') return;
      animId = requestAnimationFrame(loop);
      update();
      draw();
    }

    function update() {
      // Mover jugador
      const speed = playerPad.speed;
      if ((keys['ArrowUp'] || keys['w'] || padUp) && playerPad.y > 0) playerPad.y -= speed;
      if ((keys['ArrowDown'] || keys['s'] || padDown) && playerPad.y + playerPad.h < H) playerPad.y += speed;

      // IA paleta derecha
      const aiCenter = aiPad.y + aiPad.h / 2;
      const ballY = ball.y;
      const aiSpeed = H * 0.009;
      if (aiCenter < ballY - 10) aiPad.y = Math.min(aiPad.y + aiSpeed, H - aiPad.h);
      else if (aiCenter > ballY + 10) aiPad.y = Math.max(aiPad.y - aiSpeed, 0);

      // Trail
      ball.trail.push({ x: ball.x, y: ball.y });
      if (ball.trail.length > 8) ball.trail.shift();

      // Mover pelota
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Rebote techo/suelo
      if (ball.y - ball.r < 0) { ball.vy = Math.abs(ball.vy); ball.y = ball.r; }
      if (ball.y + ball.r > H) { ball.vy = -Math.abs(ball.vy); ball.y = H - ball.r; }

      // Colisión jugador
      if (ball.x - ball.r < playerPad.x + playerPad.w &&
          ball.x - ball.r > playerPad.x &&
          ball.y > playerPad.y && ball.y < playerPad.y + playerPad.h) {
        const hitPos = (ball.y - (playerPad.y + playerPad.h / 2)) / (playerPad.h / 2);
        const angle = hitPos * 60 * (Math.PI / 180);
        const spd = Math.min(Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) * 1.05, W * 0.018);
        ball.vx = Math.cos(angle) * spd;
        ball.vy = Math.sin(angle) * spd;
        ball.x = playerPad.x + playerPad.w + ball.r;
      }

      // Colisión IA
      if (ball.x + ball.r > aiPad.x &&
          ball.x + ball.r < aiPad.x + aiPad.w &&
          ball.y > aiPad.y && ball.y < aiPad.y + aiPad.h) {
        const hitPos = (ball.y - (aiPad.y + aiPad.h / 2)) / (aiPad.h / 2);
        const angle = hitPos * 60 * (Math.PI / 180);
        const spd = Math.min(Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) * 1.05, W * 0.018);
        ball.vx = -Math.cos(angle) * spd;
        ball.vy = Math.sin(angle) * spd;
        ball.x = aiPad.x - ball.r;
      }

      // Punto
      if (ball.x + ball.r < 0) {
        aiScore++;
        resetBall();
        if (aiScore >= WIN_SCORE) { state = 'gameover'; showEnd(false); }
      }
      if (ball.x - ball.r > W) {
        playerScore++;
        resetBall();
        if (playerScore >= WIN_SCORE) { state = 'gameover'; showEnd(true); }
      }
    }

    function draw() {
      ctx.fillStyle = '#0d0010';
      ctx.fillRect(0, 0, W, H);

      // Línea central
      ctx.setLineDash([15, 10]);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
      ctx.setLineDash([]);

      // Marcadores
      ctx.font = `bold ${H * 0.08}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillText(playerScore, W / 4, H * 0.1);
      ctx.fillText(aiScore, W * 3 / 4, H * 0.1);

      // Trail de pelota
      ball.trail.forEach((p, i) => {
        const alpha = (i / ball.trail.length) * 0.3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, ball.r * (i / ball.trail.length), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(168,85,247,${alpha})`;
        ctx.fill();
      });

      // Pelota
      const grad = ctx.createRadialGradient(ball.x - ball.r*0.3, ball.y - ball.r*0.3, 0, ball.x, ball.y, ball.r);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(1, '#a855f7');
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Paletas
      function drawPad(pad, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(pad.x, pad.y, pad.w, pad.h, 6);
        ctx.fill();
        // Brillo
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.roundRect(pad.x + 2, pad.y + 4, 3, pad.h - 8, 3);
        ctx.fill();
      }
      drawPad(playerPad, '#00e5ff');
      drawPad(aiPad, '#ff4444');

      // Etiquetas
      ctx.font = `bold 11px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,229,255,0.6)';
      ctx.fillText('TÚ', playerPad.x + PAD_W/2, H - 8);
      ctx.fillStyle = 'rgba(255,68,68,0.6)';
      ctx.fillText('IA', aiPad.x + PAD_W/2, H - 8);
    }

    function showEnd(playerWon) {
      if (playerWon && playerScore > bestScore) {
        bestScore = playerScore;
        localStorage.setItem('score_pingpong', playerScore);
        try { if (window.parent && window.parent !== window && window.parent.guardarPuntuacion) window.parent.guardarPuntuacion('pingpong', playerScore); } catch(e){}
      }
      const ov = document.getElementById('overlay');
      ov.style.display = 'flex';
      ov.innerHTML = `
        <div style="font-size:54px">${playerWon ? '🏆' : '😞'}</div>
        <h2 style="color:${playerWon ? '#ffd700' : '#ff6b6b'}">${playerWon ? '¡GANASTE!' : 'PERDISTE'}</h2>
        <p class="score-msg">${playerScore} - ${aiScore}</p>
        <p style="color:#aaa;font-size:14px">Mejor: ${bestScore} pts</p>
        <button class="btn-game" onclick="startGame()">Revancha</button>
      `;
    }

    // Teclado
    document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // Botones móvil (click fallback)
    document.getElementById('btnUp').addEventListener('mousedown', () => padUp = true);
    document.getElementById('btnUp').addEventListener('mouseup', () => padUp = false);
    document.getElementById('btnDown').addEventListener('mousedown', () => padDown = true);
    document.getElementById('btnDown').addEventListener('mouseup', () => padDown = false);
  </script>
</body>
</html>
