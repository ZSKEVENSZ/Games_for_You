<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sopa de Letras</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1d1e33; min-height: 100vh; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    header { width: 100%; max-width: 520px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .back-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); padding: 10px 14px; border-radius: 12px; color: #f8fafc; text-decoration: none; font-weight: 700; }
    h1 { font-size: 28px; text-align: center; width: 100%; }
    .info { max-width: 520px; color: #cbd5e1; text-align: center; margin-bottom: 16px; }
    #wordList { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 18px; }
    .word { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; padding: 10px 14px; font-weight: 700; }
    #grid { display: grid; gap: 6px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 16px; }
    .cell { width: 50px; height: 50px; display: grid; place-items: center; border-radius: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); font-size: 22px; font-weight: 800; cursor: pointer; user-select: none; transition: transform 0.1s, background 0.2s; }
    .cell:hover { transform: scale(1.02); }
    .cell.selected { background: rgba(148,163,184,0.5); }
    .cell.found { background: rgba(34,197,94,0.4); border-color: rgba(34,197,94,0.7); color: #fff; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
    .stat { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 10px 14px; min-width: 110px; text-align: center; }
    .stat strong { display: block; font-size: 18px; margin-bottom: 4px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }
    .btn { background: linear-gradient(135deg,#8b5cf6,#2563eb); border: none; color: #fff; border-radius: 14px; padding: 12px 18px; font-weight: 700; cursor: pointer; transition: transform 0.1s, filter 0.2s; }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: scale(0.98); }
    .message { margin-top: 14px; min-height: 24px; color: #cbd5e1; text-align: center; }
  </style>
</head>
<body>
  <header>
    <a href="menu.html" class="back-btn">← Menú</a>
    <h1>🔤 Sopa de Letras</h1>
  </header>
  <p class="info">Selecciona las letras en la cuadrícula para encontrar las palabras de la lista. Puedes seleccionarlas en cualquier dirección.</p>

  <div id="wordList"></div>
  <div id="grid"></div>
  <div class="stats">
    <div class="stat"><strong id="foundCount">0</strong> Encontradas</div>
    <div class="stat"><strong id="targetCount">6</strong> Objetivo</div>
    <div class="stat"><strong id="bestVal">0</strong> Récord</div>
  </div>
  <div class="actions">
    <button class="btn" id="resetBtn">Reiniciar</button>
    <button class="btn" id="showWordBtn">Mostrar palabra</button>
  </div>
  <div class="message" id="message">Selecciona una secuencia de letras para formar una palabra.</div>

  <script>
    const WORDS = ['JAVA','LIGA','LUNA','MEMO','ARCO','NUBE'];
    const GRID = [
      ['J','A','V','A','L','U'],
      ['U','N','E','B','O','N'],
      ['M','E','M','O','C','I'],
      ['R','A','L','A','G','A'],
      ['C','O','D','E','S','U'],
      ['N','U','B','E','X','Y']
    ];
    let selected = [];
    let found = new Set();
    let bestScore = parseInt(localStorage.getItem('score_sopa') || '0');
    document.getElementById('bestVal').textContent = bestScore;
    const gridEl = document.getElementById('grid');
    const wordListEl = document.getElementById('wordList');

    function init() {
      selected = [];
      found = new Set();
      gridEl.innerHTML = '';
      wordListEl.innerHTML = '';
      document.getElementById('foundCount').textContent = 0;
      document.getElementById('targetCount').textContent = WORDS.length;
      document.getElementById('message').textContent = 'Selecciona una secuencia de letras para formar una palabra.';

      WORDS.forEach(word => {
        const badge = document.createElement('div');
        badge.className = 'word';
        badge.textContent = word;
        wordListEl.appendChild(badge);
      });

      GRID.forEach((row, r) => {
        row.forEach((char, c) => {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.textContent = char;
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.onclick = () => toggleCell(r,c);
          gridEl.appendChild(cell);
        });
      });
      gridEl.style.gridTemplateColumns = `repeat(${GRID[0].length}, 50px)`;
    }

    function toggleCell(r,c) {
      if (found.size === WORDS.length) return;
      const key = `${r},${c}`;
      const index = selected.findIndex(item => item.key === key);
      if (index >= 0) {
        selected.splice(index, 1);
      } else {
        selected.push({ key, r, c, char: GRID[r][c] });
      }
      updateSelection();
    }

    function updateSelection() {
      document.querySelectorAll('.cell').forEach(el => el.classList.remove('selected'));
      selected.forEach(item => {
        const el = document.querySelector(`.cell[data-row='${item.r}'][data-col='${item.c}']`);
        if (el) el.classList.add('selected');
      });
      const word = selected.map(i => i.char).join('');
      if (word.length >= 3 && WORDS.includes(word) && !found.has(word)) {
        found.add(word);
        document.querySelectorAll('.word').forEach(el => { if (el.textContent === word) el.style.textDecoration = 'line-through'; });
        document.querySelectorAll('.cell.selected').forEach(el => el.classList.add('found'));
        selected = [];
        updateFound();
      } else {
        document.getElementById('message').textContent = word ? `Secuencia: ${word}` : 'Selecciona una secuencia de letras.';
      }
    }

    function updateFound() {
      document.getElementById('foundCount').textContent = found.size;
      if (found.size === WORDS.length) {
        const score = WORDS.length * 120;
        document.getElementById('message').textContent = `¡Completado! Puntuación: ${score}`;
        if (score > bestScore) { bestScore = score; localStorage.setItem('score_sopa', score); document.getElementById('bestVal').textContent = bestScore; }
        try { if (window.parent && window.parent !== window && window.parent.guardarPuntuacion) window.parent.guardarPuntuacion('sopa', score); } catch(e){}
      }
    }

    document.getElementById('resetBtn').onclick = init;
    document.getElementById('showWordBtn').onclick = () => {
      if (found.size === WORDS.length) return;
      const next = WORDS.find(word => !found.has(word));
      document.getElementById('message').textContent = `Busca ahora: ${next}`;
    };

    init();
  </script>
</body>
</html>
