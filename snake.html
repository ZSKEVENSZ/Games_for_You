<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Serpiente Clásica</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }
    #ui {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      z-index: 10;
    }
    .ui-box {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 6px 18px;
      text-align: center;
      min-width: 80px;
    }
    .ui-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .ui-value { font-size: 22px; font-weight: 900; }
    canvas {
      display: block;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px;
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.87);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 20;
    }
    #overlay h2 { font-size: 36px; font-weight: 900; color: #44ff88; text-shadow: 0 0 20px #44ff8899; }
    #overlay p { font-size: 15px; color: #bbb; text-align: center; max-width: 240px; }
    .score-display { font-size: 28px; color: #ffd700; font-weight: bold; }
    .btn-game {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border: none;
      color: #fff;
      padding: 13px 38px;
      border-radius: 30px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.5);
      transition: transform 0.1s;
    }
    .btn-game:hover { transform: scale(1.05); }
    .btn-game:active { transform: scale(0.97); }
    .btn-secondary {
      background: linear-gradient(135deg, #374151, #4b5563);
      box-shadow: none;
    }
    #dpad {
      position: absolute;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 15;
    }
    .dpad-row { display: flex; gap: 4px; }
    .dpad-btn {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 22px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .dpad-btn:active { background: rgba(255,255,255,0.3); }
    .dpad-center { width: 56px; height: 56px; }
  </style>
</head>
<body>

  <div id="ui">
    <div class="ui-box">
      <div class="ui-label">Puntos</div>
      <div class="ui-value" style="color:#ffd700" id="scoreVal">0</div>
    </div>
    <div class="ui-box">
      <div class="ui-label">Récord</div>
      <div class="ui-value" style="color:#a78bfa" id="bestVal">0</div>
    </div>
    <div class="ui-box">
      <div class="ui-label">Largo</div>
      <div class="ui-value" style="color:#44ff88" id="lengthVal">1</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="dpad">
    <div class="dpad-row">
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="btnUp">▲</button>
      <div class="dpad-center"></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="btnLeft">◀</button>
      <div class="dpad-center" style="width:56px;height:56px;"></div>
      <button class="dpad-btn" id="btnRight">▶</button>
    </div>
    <div class="dpad-row">
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="btnDown">▼</button>
      <div class="dpad-center"></div>
    </div>
  </div>

  <div id="overlay">
    <div style="font-size:60px">🐍</div>
    <h2>SERPIENTE</h2>
    <p>Usa las flechas del teclado o el D-Pad para moverte. ¡Come las manzanas sin chocarte!</p>
    <button class="btn-game" onclick="startGame()">¡Iniciar!</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const CELL = 20;
    let COLS, ROWS;
    let bestScore = parseInt(localStorage.getItem('score_snake') || '0');
    document.getElementById('bestVal').textContent = bestScore;

    function resizeCanvas() {
      const size = Math.min(window.innerWidth - 16, window.innerHeight - 200, 400);
      const s = Math.floor(size / CELL) * CELL;
      canvas.width = s;
      canvas.height = s;
      COLS = canvas.width / CELL;
      ROWS = canvas.height / CELL;
    }
    resizeCanvas();

    let snake, dir, nextDir, food, specialFood, score, gameLoop, gameActive, frameDelay;
    let specialTimer = 0;

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      snake = [
        { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
        { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
        { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      specialFood = null;
      specialTimer = 0;
      frameDelay = 130;
      spawnFood();
      updateUI();
      gameActive = true;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, frameDelay);
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function spawnSpecialFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (food.x === pos.x && food.y === pos.y));
      specialFood = pos;
      specialTimer = 80;
    }

    function tick() {
      if (!gameActive) return;
      dir = { ...nextDir };

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Colisión paredes
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }
      // Colisión cuerpo
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame(); return;
      }

      snake.unshift(head);

      let ate = false;
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        ate = true;
        spawnFood();
        if (score % 50 === 0 && !specialFood) spawnSpecialFood();
        // Acelerar con el tiempo
        if (score > 0 && score % 100 === 0) {
          frameDelay = Math.max(50, frameDelay - 8);
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, frameDelay);
        }
      } else if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
        score += 30;
        ate = true;
        specialFood = null;
      }

      if (!ate) snake.pop();

      if (specialTimer > 0) {
        specialTimer--;
        if (specialTimer === 0) specialFood = null;
      }

      updateUI();
      draw();
    }

    function draw() {
      // Fondo con cuadrícula
      ctx.fillStyle = '#0a1628';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Cuadrícula sutil
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, canvas.height); ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(canvas.width, r * CELL); ctx.stroke();
      }

      // Comida normal (manzana)
      ctx.font = `${CELL - 2}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🍎', food.x * CELL + CELL / 2, food.y * CELL + CELL / 2);

      // Comida especial (estrella)
      if (specialFood) {
        const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 150);
        ctx.globalAlpha = pulse;
        ctx.fillText('⭐', specialFood.x * CELL + CELL / 2, specialFood.y * CELL + CELL / 2);
        ctx.globalAlpha = 1;
      }

      // Serpiente
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const ratio = 1 - i / snake.length;
        const green = Math.floor(100 + ratio * 155);
        ctx.fillStyle = isHead ? '#00ff88' : `rgb(0, ${green}, 60)`;
        const pad = isHead ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, isHead ? 6 : 4);
        ctx.fill();

        // Ojos de la cabeza
        if (isHead) {
          ctx.fillStyle = '#001a00';
          const ex1 = seg.x * CELL + CELL / 2 + dir.y * 3 - dir.x * 4;
          const ey1 = seg.y * CELL + CELL / 2 + dir.x * 3 - dir.y * 4;
          const ex2 = seg.x * CELL + CELL / 2 - dir.y * 3 - dir.x * 4;
          const ey2 = seg.y * CELL + CELL / 2 - dir.x * 3 - dir.y * 4;
          ctx.beginPath(); ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2); ctx.fill();
        }
      });
    }

    function updateUI() {
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('bestVal').textContent = bestScore;
      document.getElementById('lengthVal').textContent = snake.length;
    }

    function endGame() {
      gameActive = false;
      clearInterval(gameLoop);
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('score_snake', score);
        try { if (window.parent && window.parent !== window && window.parent.guardarPuntuacion) window.parent.guardarPuntuacion('snake', score); } catch(e){}
      }
      const ov = document.getElementById('overlay');
      ov.style.display = 'flex';
      ov.innerHTML = `
        <div style="font-size:50px">💀</div>
        <h2 style="color:#ff6b6b">GAME OVER</h2>
        <p class="score-display">Puntos: ${score}</p>
        <p style="color:#aaa;font-size:14px">Récord: ${bestScore}</p>
        <button class="btn-game" onclick="startGame()">Reintentar</button>
      `;
    }

    // Teclado
    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
        ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
        w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0}
      };
      const nd = map[e.key];
      if (nd) {
        e.preventDefault();
        if (!(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
      }
    });

    // D-Pad
    function setDir(nd) {
      if (!(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
    }
    document.getElementById('btnUp').addEventListener('click', () => setDir({x:0,y:-1}));
    document.getElementById('btnDown').addEventListener('click', () => setDir({x:0,y:1}));
    document.getElementById('btnLeft').addEventListener('click', () => setDir({x:-1,y:0}));
    document.getElementById('btnRight').addEventListener('click', () => setDir({x:1,y:0}));

    // Swipe
    let tx = 0, ty = 0;
    canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
    canvas.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      const dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > Math.abs(dy)) {
        setDir(dx > 0 ? {x:1,y:0} : {x:-1,y:0});
      } else {
        setDir(dy > 0 ? {x:0,y:1} : {x:0,y:-1});
      }
    }, {passive:true});
  </script>
</body>
</html>
